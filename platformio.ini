; Hello World — M5Stack Cardputer Adv
; Compatible with bmorcelli/Launcher  (https://bmorcelli.github.io/Launcher/)
;
; Build:   pio run -e m5stack-cardputer-adv
; Output:  .pio/build/m5stack-cardputer-adv/firmware.bin
;
; Flashing via Launcher:
;   • Copy firmware.bin to the SD card root and run from the Launcher menu, OR
;   • pio run -e m5stack-cardputer-adv -t upload --upload-port /dev/ttyACM0

[platformio]
default_envs = m5stack-cardputer-adv

[env:m5stack-cardputer-adv]
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.32/platform-espressif32.zip
; pioarduino 55.03.32 does not ship a dedicated Cardputer board manifest.
; The ADV uses an ESP32-S3FN8, so target the generic 8 MB ESP32-S3 devkit
; and keep the Cardputer-specific flash settings below in this project.
board           = esp32-s3-devkitc-1
framework       = arduino

; 8 MB flash — same chip as original Cardputer (ESP32-S3FN8)
board_build.partitions  = default_8MB.csv
board_build.flash_mode  = qio
board_build.f_flash     = 80000000L

monitor_speed   = 115200
upload_speed    = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1     ; USB-CDC serial via built-in USB
    -DCARDPUTER_ADV=1               ; ADV variant flag (TCA8418 keyboard)

lib_deps =
    m5stack/M5Unified @ ^0.2.2
    adafruit/Adafruit TCA8418 @ ^1.0.1
